for($row=1; $row<=20; $row++)
{

    $num = rand(1,100);

    // odd row → even number
    if($row % 2 == 1)
    {
        if($num % 2 != 0)
        {
            $num++;
        }
    }

    // even row → odd number
    else
    {
        if($num % 2 == 0)
        {
            $num++;
        }
    }

    echo "<tr>";
    echo "<th>$row</th>";

    for($col=0; $col<5; $col++)
    {
        echo "<td>".($num+$col)."</td>";
    }

    echo "</tr>";

}
